{% extends "base.html" %}
{% block title %}Accedi — Weight Tracker{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-500 text-white text-2xl mb-3 shadow-lg">⚖️</div>
      <h1 class="text-2xl font-bold text-slate-900">Weight Tracker</h1>
      <p class="text-slate-500 text-sm mt-1">Monitora il tuo progresso</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">

      {% if registered %}
      <div class="mb-5 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700">
        Account creato! Puoi accedere ora.
      </div>
      {% endif %}

      {% if error %}
      <div class="mb-5 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
          <input type="text" name="username" required autocomplete="username"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-sm transition" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-sm transition" />
        </div>
        <button type="submit"
          class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white font-semibold rounded-lg transition text-sm shadow-sm">
          Accedi
        </button>
      </form>

      <p class="mt-5 text-center text-sm text-slate-500">
        Non hai un account?
        <a href="/register" class="text-brand-600 font-medium hover:underline">Registrati</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
